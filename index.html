<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Shop Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0617;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --accent-color: #8a2be2;
            --pink-accent: #ff00ff;
            --neon-green: #00ffcc;
            --light-purple: #bf77ff;
            --card-radius: 25px;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .header-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50px; /* Сильное закругление */
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(138, 43, 226, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--pink-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-transform: uppercase;
        }

        .currency-switcher {
            display: flex;
            background: var(--glass-bg);
            border-radius: 15px;
            padding: 4px;
            margin: 15px auto;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .curr-btn {
            padding: 6px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .curr-btn.active {
            background: var(--accent-color);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--card-radius);
            padding: 20px 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:active { transform: scale(0.94); background: rgba(138, 43, 226, 0.2); }

        .card-stars { font-size: 20px; font-weight: 800; display: block; }
        .card-price { color: var(--neon-green); font-size: 15px; font-weight: bold; margin-top: 5px; display: block; }

        .input-area {
            margin-top: 20px;
            background: var(--glass-bg);
            border-radius: var(--card-radius);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-color);
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .total-display {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            margin-top: 15px;
            color: var(--neon-green);
        }

        .main-button {
            width: 100%;
            margin-top: 20px;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #8a2be2, #4b0082);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
            cursor: pointer;
        }

        /* КНОПКА ПОДДЕРЖКИ */
        .support-button {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            background: rgba(255, 0, 255, 0.05);
            color: var(--pink-accent);
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .support-button:active {
            background: rgba(255, 0, 255, 0.2);
            transform: scale(0.98);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            opacity: 0.4;
            text-align: center;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" class="header-img" alt="Logo">
    </div>

    <h1>STARS SHOP PREMIUM</h1>
    
    <div class="currency-switcher">
        <div id="btn-uah" class="curr-btn active" onclick="setCurrency('UAH')">ГРН</div>
        <div id="btn-usdt" class="curr-btn" onclick="setCurrency('USDT')">USDT</div>
    </div>

    <div class="grid">
        <div class="card" onclick="selectPack(100)">
            <span class="card-stars">⭐ 100</span>
            <span class="card-price" id="p100">65 грн</span>
        </div>
        <div class="card" onclick="selectPack(500)">
            <span class="card-stars">⭐ 500</span>
            <span class="card-price" id="p500">325 грн</span>
        </div>
        <div class="card" onclick="selectPack(1000)">
            <span class="card-stars">⭐ 1000</span>
            <span class="card-price" id="p1000">650 грн</span>
        </div>
        <div class="card" onclick="selectPack(5000)">
            <span class="card-stars">⭐ 5000</span>
            <span class="card-price" id="p5000">3250 грн</span>
        </div>
    </div>

    <div class="input-area">
        <input type="number" id="customInput" placeholder="Введите кол-во" oninput="calculate()">
        <div class="total-display" id="totalResult">Итого: 0 грн</div>
    </div>

    <button class="main-button" onclick="checkout()">ОФОРМИТЬ ЗАКАЗ</button>

    <div class="support-button" onclick="openSupport()">
        <span>💬</span> НАПИСАТЬ В ПОДДЕРЖКУ
    </div>

    <div class="footer">
        ⚡ Мгновенная доставка <br>
        Владелец: Олександр Маринич
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#0b0617';

    let currentCurrency = 'UAH';
    const rateUAH = 0.65;
    const rateUSDT = 0.016;

    function setCurrency(curr) {
        currentCurrency = curr;
        document.getElementById('btn-uah').classList.toggle('active', curr === 'UAH');
        document.getElementById('btn-usdt').classList.toggle('active', curr === 'USDT');
        
        document.getElementById('p100').innerText = curr === 'UAH' ? '65 грн' : '1.6 USDT';
        document.getElementById('p500').innerText = curr === 'UAH' ? '325 грн' : '8.0 USDT';
        document.getElementById('p1000').innerText = curr === 'UAH' ? '650 грн' : '16.0 USDT';
        document.getElementById('p5000').innerText = curr === 'UAH' ? '3250 грн' : '80.0 USDT';
        
        calculate();
    }

    function calculate() {
        let val = document.getElementById('customInput').value;
        let rate = currentCurrency === 'UAH' ? rateUAH : rateUSDT;
        let total = (val * rate).toFixed(2);
        let symbol = currentCurrency === 'UAH' ? 'грн' : 'USDT';
        document.getElementById('totalResult').innerText = `Итого: ${total} ${symbol}`;
    }

    function selectPack(num) {
        document.getElementById('customInput').value = num;
        calculate();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function checkout() {
        let val = document.getElementById('customInput').value;
        if (val > 0) {
            tg.sendData(`ORDER_${val}_${currentCurrency}`);
        } else {
            tg.showAlert("Выберите количество звезд!");
        }
    }

    // Функция для открытия твоей лички
    function openSupport() {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        tg.openTelegramLink("https://t.me/Grozny4");
    }
</script>

</body>
</html>
