<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Shop Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0617;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --accent-color: #8a2be2;
            --neon-green: #00ffcc;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .header-img {
            width: 100%;
            border-radius: 24px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(138, 43, 226, 0.3);
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin: 10px 0;
            background: linear-gradient(90deg, #fff, #bf77ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card:active {
            transform: scale(0.96);
            border-color: var(--neon-green);
            background: rgba(138, 43, 226, 0.15);
        }

        .card-title { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .card-stars { font-size: 20px; font-weight: 800; display: block; margin-bottom: 5px; }
        .card-price { color: var(--neon-green); font-weight: bold; }

        .custom-input-section {
            margin-top: 25px;
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(138, 43, 226, 0.2);
        }

        .input-label { font-size: 14px; color: #b388ff; margin-bottom: 12px; display: block; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-color);
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        .total-box {
            margin-top: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
        }

        .buy-button {
            width: 100%;
            margin-top: 25px;
            padding: 20px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #8a2be2, #4b0082);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        .buy-button:active { transform: translateY(2px); opacity: 0.9; }

        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.5;
            text-align: center;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" class="header-img">
        </div>

        <h1>STARS SHOP</h1>

        <div class="grid">
            <div class="card" onclick="setAmount(100)">
                <span class="card-stars">⭐ 100</span>
                <span class="card-price">65 грн</span>
            </div>
            <div class="card" onclick="setAmount(500)">
                <span class="card-stars">⭐ 500</span>
                <span class="card-price">325 грн</span>
            </div>
            <div class="card" onclick="setAmount(1000)">
                <span class="card-stars">⭐ 1000</span>
                <span class="card-price">650 грн</span>
            </div>
            <div class="card" onclick="setAmount(5000)">
                <span class="card-stars">⭐ 5000</span>
                <span class="card-price">3250 грн</span>
            </div>
        </div>

        <div class="custom-input-section">
            <span class="input-label">Введите свое количество:</span>
            <input type="number" id="starsInput" placeholder="0" oninput="updatePrice()">
            <div class="total-box" id="totalPrice">Итого: 0 грн</div>
        </div>

        <button class="buy-button" onclick="sendToBot()">ОФОРМИТЬ ЗАКАЗ</button>

        <div class="footer-note">
            🛡️ Официальное зачисление через Telegram <br>
            Владелец: Маринич Олександр
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0b0617';
        tg.backgroundColor = '#0b0617';

        function updatePrice() {
            let val = document.getElementById('starsInput').value;
            let total = (val * 0.65).toFixed(2);
            document.getElementById('totalPrice').innerText = `Итого: ${total} грн`;
        }

        function setAmount(num) {
            document.getElementById('starsInput').value = num;
            updatePrice();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function sendToBot() {
            let val = document.getElementById('starsInput').value;
            if (val < 1) {
                tg.showAlert("Пожалуйста, укажите количество звезд!");
                return;
            }
            // Отправляем данные боту
            tg.sendData("ORDER_" + val);
        }
    </script>
</body>
</html>
